<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agenda | Barbería Ferraza</title>
    <meta name="description" content="Gestión de agenda interna - Barbería Ferraza">
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Tailwind CSS (linking existing output.css) -->
    <link href="/output.css" rel="stylesheet">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="/firebase-config.js"></script>
    <script src="/config.js"></script>
    <script src="/db.js"></script>
    <script src="/firebaseUtils.js?v=2.0"></script>

    <style>
        body {
            background-color: #050505;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(17, 17, 21, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .text-neon {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
        }

        .border-neon {
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="min-h-screen bg-brand-bg antialiased pb-10">

    <!-- Pantalla de Carga -->
    <div id="loadingOverlay" class="fixed inset-0 z-[10000] flex flex-col items-center justify-center bg-[#050505] transition-opacity duration-300">
        <div class="w-12 h-12 border-4 border-white/10 border-t-white rounded-full animate-spin mb-4 shadow-[0_0_15px_rgba(255,255,255,0.2)]"></div>
        <p class="text-white/60 text-sm font-medium animate-pulse tracking-widest uppercase">Cargando Agenda...</p>
    </div>

    <!-- Header Navigation -->
    <header class="sticky top-0 z-50 w-full px-6 py-5 flex items-center justify-between bg-brand-bg/90 backdrop-blur-md border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full border border-white/20 flex items-center justify-center bg-white/5">
                <i class="ph-bold ph-calendar text-xl text-white"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold text-white tracking-tight" id="barberNameHeader">Agenda</h1>
                <p class="text-[10px] text-white/40 uppercase tracking-[0.2em] font-semibold">Gestión Interna</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="firebase.auth().signOut()" class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center hover:bg-white/5 transition-colors" title="Cerrar sesión">
                <i class="ph-bold ph-sign-out text-lg text-white/60"></i>
            </button>
            <button onclick="window.location.href='/'" class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center hover:bg-white/5 transition-colors" title="Ir al inicio">
                <i class="ph-bold ph-house text-lg text-white/60"></i>
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 pt-8 hidden" id="mainApp">
        
        <!-- Latest Reservations Section -->
        <div class="mb-12 animate-fade-in" style="animation-delay: 0.05s;">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xs font-bold text-white/30 uppercase tracking-[0.2em] flex items-center gap-2">
                    <i class="ph-bold ph-clock-counter-clockwise"></i> Últimas Reservas
                </h3>
            </div>
            <div id="latestReservationsContainer" class="flex gap-4 overflow-x-auto pb-4 no-scrollbar -mx-6 px-6">
                <!-- Se llena dinámicamente -->
                <div class="flex-shrink-0 w-72 h-32 glass-card rounded-2xl flex items-center justify-center border-dashed border-white/5">
                    <p class="text-white/20 text-xs italic">Cargando actividad reciente...</p>
                </div>
            </div>
        </div>
        <!-- Day Selector / Calendar Header -->
        <div class="mb-10 animate-fade-in" style="animation-delay: 0.1s;">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold text-white tracking-tight" id="currentDateDisplay">Cargando...</h2>
                <div class="flex gap-2">
                    <button onclick="cambiarDia(-1)" class="p-2 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all">
                        <i class="ph-bold ph-caret-left text-white/60"></i>
                    </button>
                    <button onclick="cambiarDia(1)" class="p-2 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all">
                        <i class="ph-bold ph-caret-right text-white/60"></i>
                    </button>
                </div>
            </div>
            
            <div class="flex gap-3 overflow-x-auto pb-4 no-scrollbar -mx-6 px-6" id="daySelectorContainer">
                <!-- Se llena dinámicamente -->
            </div>
        </div>

        <!-- Schedule Grid -->
        <div class="space-y-4 animate-fade-in" style="animation-delay: 0.2s;">
            
            <!-- Morning Section -->
            <div id="morningSection" class="hidden">
                <h3 class="text-xs font-bold text-white/30 uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                    <i class="ph-bold ph-sun-horizon"></i> Mañana
                </h3>
                <div class="space-y-3" id="morningSlots"></div>
            </div>

            <!-- Afternoon Section -->
            <div id="afternoonSection" class="hidden pt-6">
                <h3 class="text-xs font-bold text-white/30 uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                    <i class="ph-bold ph-sun"></i> Tarde
                </h3>
                <div class="space-y-3" id="afternoonSlots"></div>
            </div>

            <div id="emptyAgenda" class="hidden py-12 text-center">
                <i class="ph ph-calendar-blank text-4xl text-white/20 mb-3"></i>
                <p class="text-white/40 text-sm">No hay turnos configurados para este día.</p>
            </div>
        </div>
    </main>

    <script>
        // ── ESTADO GLOBAL DE LA AGENDA ──
        let barberId = window.location.pathname.split('/').pop() || '';
        if(barberId.includes('.html')) barberId = barberId.replace('.html', '');
        if(!barberId || barberId === 'agenda') {
            window.location.href = '/gestion-interna/';
        }

        let currentDate = new Date();
        let barberConfig = null;
        let globalConfig = null;
        let todayCitas = [];
        let todayBloqueos = [];

        // Suscripciones de Firestore para limpiarlas si cambia el día
        let unsubs = [];

        // ── INICIALIZACIÓN ──
        document.addEventListener('DOMContentLoaded', () => {
            firebase.auth().onAuthStateChanged(async (user) => {
                if (user) {
                    const isBarbero = await FDB.esBarbero(user.email, user.uid);
                    if (!isBarbero) {
                        window.location.href = '/dashboard';
                        return;
                    }
                    
                    const isAdmin = await FDB.esAdminJefe(user.email, user.uid);
                    const myBarberId = await FDB.getBarberoId(user.email, user.uid) || user.uid;

                    if (!isAdmin && myBarberId !== barberId) {
                        window.location.href = `/agenda/${myBarberId}`;
                        return;
                    }

                    await loadBarberData();
                    renderDaySelector();
                    loadAgendaData();
                    loadLatestReservations();

                    document.getElementById('loadingOverlay').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');
                } else {
                    window.location.href = '/gestion-interna/login/';
                }
            });
        });

        async function loadBarberData() {
            // Cargar configuración global y del barbero
            globalConfig = await FDB.getConfig();
            barberConfig = await FDB.getConfigBarbero(barberId);

            // Obtener nombre del barbero
            try {
                const doc = await db.collection('barberos').doc(barberId).get();
                if(doc.exists) {
                    document.getElementById('barberNameHeader').textContent = 'Agenda ' + doc.data().nombre;
                }
            } catch(e) {}
        }

        // ── MANEJO DE FECHAS ──
        function cambiarDia(offset) {
            currentDate.setDate(currentDate.getDate() + offset);
            renderDaySelector();
            loadAgendaData();
        }

        function seleccionarDia(year, month, date) {
            currentDate = new Date(year, month, date);
            renderDaySelector();
            loadAgendaData();
        }

        function renderDaySelector() {
            const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
            const diasCorto = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
            
            document.getElementById('currentDateDisplay').textContent = `${meses[currentDate.getMonth()]} ${currentDate.getFullYear()}`;

            const container = document.getElementById('daySelectorContainer');
            container.innerHTML = '';

            // Renderizar desde 3 días antes hasta 3 días después
            for (let i = -3; i <= 3; i++) {
                const tempDate = new Date(currentDate);
                tempDate.setDate(currentDate.getDate() + i);
                
                const isSelected = i === 0;
                const dateNum = tempDate.getDate();
                const dayName = diasCorto[tempDate.getDay()];
                const y = tempDate.getFullYear(), m = tempDate.getMonth(), d = dateNum;

                const btn = document.createElement('button');
                btn.onclick = () => seleccionarDia(y, m, d);

                if (isSelected) {
                    btn.className = "flex-shrink-0 w-16 h-20 rounded-2xl border border-white/40 flex flex-col items-center justify-center transition-all bg-white/10 shadow-[0_0_15px_rgba(255,255,255,0.1)] scale-105";
                    btn.innerHTML = `
                        <span class="text-[10px] font-bold text-white uppercase mb-1">${dayName}</span>
                        <span class="text-xl font-bold text-white">${dateNum}</span>
                        <div class="w-1 h-1 rounded-full bg-white mt-1"></div>
                    `;
                } else {
                    btn.className = "flex-shrink-0 w-16 h-20 rounded-2xl border border-white/10 flex flex-col items-center justify-center transition-all bg-white/5 hover:border-white/30 cursor-pointer";
                    btn.innerHTML = `
                        <span class="text-[10px] font-bold text-white/40 uppercase mb-1">${dayName}</span>
                        <span class="text-xl font-bold text-white">${dateNum}</span>
                    `;
                }
                container.appendChild(btn);
            }
        }

        // ── CARGA Y RENDERIZADO DE AGENDA ──
        function loadAgendaData() {
            unsubs.forEach(u => u());
            unsubs = [];

            const yyyy = currentDate.getFullYear();
            const mm = String(currentDate.getMonth() + 1).padStart(2, '0');
            const dd = String(currentDate.getDate()).padStart(2, '0');
            const fechaStr = `${yyyy}-${mm}-${dd}`;

            // Citas
            const unsubCitas = db.collection('citas')
                .where('fecha', '==', fechaStr)
                .where('barberoId', '==', barberId)
                .onSnapshot(snap => {
                    todayCitas = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    renderSlots();
                });

            // Bloqueos (para este barbero específicamente)
            const unsubBloq = db.collection('bloqueos')
                .where('fecha', '==', fechaStr)
                .where('barberoId', '==', barberId)
                .onSnapshot(snap => {
                    todayBloqueos = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    renderSlots();
                });

            // Bloqueos globales (si los hay)
            const unsubBloqGlob = db.collection('bloqueos')
                .where('fecha', '==', fechaStr)
                .where('barberoId', '==', null)
                .onSnapshot(snap => {
                    const globs = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    // Fusionar y renderizar (evitando duplicados visuales)
                    todayBloqueos = [...todayBloqueos.filter(b => b.barberoId), ...globs];
                    renderSlots();
                });

            unsubs.push(unsubCitas, unsubBloq, unsubBloqGlob);
        }

        function renderSlots() {
            const mSec = document.getElementById('morningSection');
            const aSec = document.getElementById('afternoonSection');
            const eSec = document.getElementById('emptyAgenda');
            const mSlots = document.getElementById('morningSlots');
            const aSlots = document.getElementById('afternoonSlots');

            mSlots.innerHTML = '';
            aSlots.innerHTML = '';

            const yyyy = currentDate.getFullYear();
            const mm = String(currentDate.getMonth() + 1).padStart(2, '0');
            const dd = String(currentDate.getDate()).padStart(2, '0');
            const fechaStr = `${yyyy}-${mm}-${dd}`;

            const cfg = barberConfig || globalConfig;
            const dw  = new Date(fechaStr + 'T12:00:00').getDay();
            const dc  = (cfg.diasConfig || {})[dw] || {};

            if (dc.activo === false || !cfg.diasLaborales.includes(dw) || todayBloqueos.some(b => b.todo_el_dia)) {
                mSec.classList.add('hidden');
                aSec.classList.add('hidden');
                eSec.classList.remove('hidden');
                return;
            }

            eSec.classList.add('hidden');

            const toMins  = t => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };
            const fromMin = m => `${Math.floor(m / 60).toString().padStart(2, '0')}:${(m % 60).toString().padStart(2, '0')}`;

            const ini = toMins(dc.inicio || cfg.horarioInicio || '09:00');
            const fin = toMins(dc.fin    || cfg.horarioFin    || '20:00');
            const interval = cfg.intervaloMinutos || 30;

            const citasOcupadas = todayCitas.filter(c => c.estado !== 'Cancelada');
            
            let cur = ini;
            let hasMorning = false;
            let hasAfternoon = false;

            while (cur < fin) {
                const horaStr = fromMin(cur);
                const isAfternoon = cur >= 720; // 12:00 PM

                // 1. Verificar Citas
                const citaSlot = citasOcupadas.find(c => {
                    const cStart = toMins(c.hora);
                    const cEnd = cStart + parseInt(c.duracionServicio || interval);
                    return cur >= cStart && cur < cEnd;
                });

                if (citaSlot) {
                    if (toMins(citaSlot.hora) === cur) {
                        const html = buildCitaSlot(horaStr, citaSlot);
                        if(isAfternoon) { aSlots.insertAdjacentHTML('beforeend', html); hasAfternoon = true; }
                        else { mSlots.insertAdjacentHTML('beforeend', html); hasMorning = true; }
                    }
                    cur += interval;
                    continue;
                }

                // 2. Verificar Colación
                let esColacion = false;
                if (cfg.colacion) {
                    const colS = toMins(cfg.colacion.inicio);
                    const colE = toMins(cfg.colacion.fin);
                    if (cur >= colS && cur < colE) {
                        esColacion = true;
                        cur += interval;
                        // No renderizar bloque colación explícito por ahora para no saturar
                        continue;
                    }
                }

                // 3. Verificar Bloqueos
                const bloqueo = todayBloqueos.find(b => {
                    if (b.todo_el_dia) return true;
                    const bS = toMins(b.hora_inicio);
                    const bEnd = toMins(b.hora_fin);
                    return cur >= bS && cur < bEnd;
                });

                if (bloqueo) {
                    cur += interval;
                    continue;
                }

                // Libre
                const html = buildFreeSlot(horaStr);
                if(isAfternoon) { aSlots.insertAdjacentHTML('beforeend', html); hasAfternoon = true; }
                else { mSlots.insertAdjacentHTML('beforeend', html); hasMorning = true; }
                
                cur += interval;
            }

            if(hasMorning) mSec.classList.remove('hidden'); else mSec.classList.add('hidden');
            if(hasAfternoon) aSec.classList.remove('hidden'); else aSec.classList.add('hidden');
        }

        function buildCitaSlot(time, cita) {
            const isConfirmed = cita.estado === 'Confirmado';
            const borderCol = isConfirmed ? 'border-white' : 'border-[#eab308]'; // Yellow si pendiente
            
            return `
            <div class="glass-card rounded-2xl p-4 flex items-center justify-between group transition-all hover:bg-white/10 border-l-4 ${borderCol}">
                <div class="flex items-center gap-4">
                    <div class="text-center min-w-[50px]">
                        <p class="text-sm font-bold text-white">${time}</p>
                        <p class="text-[10px] text-white/40">${cita.duracionServicio || 30} min</p>
                    </div>
                    <div class="h-8 w-[1px] bg-white/10"></div>
                    <div>
                        <h4 class="font-bold text-white text-[15px] leading-tight">${cita.servicioNombre || 'Servicio'}</h4>
                        <p class="text-xs text-white/60 mt-1">${cita.clienteNombre || 'Cliente'}</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <span class="px-2 py-1 rounded-md bg-white/5 border border-white/10 text-[10px] font-bold text-white/60 uppercase">
                        ${isConfirmed ? 'Conf' : 'Pend'}
                    </span>
                </div>
            </div>`;
        }

        function buildFreeSlot(time) {
            return `
            <div class="rounded-2xl p-4 flex items-center justify-between border border-dashed border-white/10 hover:border-white/30 transition-all group cursor-pointer" onclick="agregarBloqueoRapido('${time}')">
                <div class="flex items-center gap-4">
                    <div class="text-center min-w-[50px]">
                        <p class="text-sm font-bold text-white/30">${time}</p>
                    </div>
                    <div class="h-8 w-[1px] bg-white/5"></div>
                    <div>
                        <p class="text-xs font-medium text-white/20 group-hover:text-white/40 transition-colors">Espacio disponible</p>
                    </div>
                </div>
                <button class="w-8 h-8 rounded-full border border-white/5 flex items-center justify-center group-hover:border-white/20 transition-all">
                    <i class="ph-bold ph-lock-key text-white/10 group-hover:text-white/40"></i>
                </button>
            </div>`;
        }

        async function agregarBloqueoRapido(time) {
            const confirm = window.confirm(`¿Deseas bloquear el horario de las ${time}?`);
            if(!confirm) return;

            const yyyy = currentDate.getFullYear();
            const mm = String(currentDate.getMonth() + 1).padStart(2, '0');
            const dd = String(currentDate.getDate()).padStart(2, '0');
            const fechaStr = `${yyyy}-${mm}-${dd}`;

            const cfg = barberConfig || globalConfig;
            const interval = cfg.intervaloMinutos || 30;
            
            const toMins  = t => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };
            const fromMin = m => `${Math.floor(m / 60).toString().padStart(2, '0')}:${(m % 60).toString().padStart(2, '0')}`;
            
            const endMins = toMins(time) + interval;
            const timeEnd = fromMin(endMins);

            await db.collection('bloqueos').add({
                fecha: fechaStr,
                barberoId: barberId,
                todo_el_dia: false,
                hora_inicio: time,
                hora_fin: timeEnd,
                motivo: 'Bloqueo rápido',
                creadoEn: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        // ── ÚLTIMAS RESERVAS ──
        function loadLatestReservations() {
            const container = document.getElementById('latestReservationsContainer');
            
            db.collection('citas')
                .where('barberoId', '==', barberId)
                .orderBy('creadoEn', 'desc')
                .limit(5)
                .onSnapshot(snap => {
                    if (snap.empty) {
                        container.innerHTML = `
                            <div class="flex-shrink-0 w-full glass-card rounded-2xl p-6 flex flex-col items-center justify-center border-dashed border-white/5">
                                <i class="ph ph-calendar-x text-2xl text-white/20 mb-2"></i>
                                <p class="text-white/30 text-xs">No hay reservas recientes aún.</p>
                            </div>
                        `;
                        return;
                    }

                    container.innerHTML = '';
                    snap.forEach(doc => {
                        const cita = doc.data();
                        const id = doc.id;
                        
                        // Formatear fecha
                        const [y, m, d] = cita.fecha.split('-');
                        const fechaFormat = `${d}/${m}`;

                        const card = document.createElement('div');
                        card.className = "flex-shrink-0 w-72 glass-card rounded-2xl p-4 border-l-4 border-brand-accent transition-all hover:bg-white/10 cursor-pointer relative overflow-hidden";
                        card.style.borderColor = "#ffffff";
                        
                        card.innerHTML = `
                            <div class="flex items-start justify-between mb-2">
                                <div>
                                    <span class="text-[10px] font-extrabold text-white/40 uppercase tracking-tighter">${fechaFormat} • ${cita.hora}</span>
                                    <h4 class="text-sm font-bold text-white leading-tight">${cita.servicioNombre}</h4>
                                </div>
                                <div class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center border border-white/10">
                                    <i class="ph ph-user text-white/60"></i>
                                </div>
                            </div>
                            
                            <div class="mt-3 space-y-1">
                                <p class="text-xs text-white/80 font-medium flex items-center gap-1.5">
                                    <i class="ph ph-user-circle text-white/40"></i> ${cita.clienteNombre}
                                </p>
                                <p class="text-[10px] text-white/40 flex items-center gap-1.5">
                                    <i class="ph ph-phone text-white/40"></i> ${cita.clienteTelefono}
                                </p>
                                ${cita.clienteEmail ? `
                                <p class="text-[10px] text-white/40 flex items-center gap-1.5">
                                    <i class="ph ph-envelope-simple text-white/40"></i> ${cita.clienteEmail}
                                </p>
                                ` : ''}
                            </div>
                            
                            <div class="absolute -right-2 -bottom-2 opacity-5">
                                <i class="ph-bold ph-quotes text-6xl text-white"></i>
                            </div>
                        `;
                        
                        container.appendChild(card);
                    });
                }, err => {
                    console.error("Error cargando últimas reservas:", err);
                    container.innerHTML = `<p class="text-red-400 text-xs">Error al cargar actividad.</p>`;
                });
        }
    </script>
</body>
</html>
